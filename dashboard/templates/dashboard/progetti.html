{% extends "dashboard/base_figma.html" %}

{% block title %}JESAP CRM - Progetti{% endblock %}

{% block content %}

      <h1 class="page__title">PROGETTI</h1>

    <div class="toolbar">
      <label class="search" aria-label="Ricerca">
        <input class="search__input" type="search" placeholder="Search" />
        <span class="search__icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

      <div class="sort">

        <button class="icon-button icon-button--small" type="button" aria-label="Vista">

    </div>

  </section>
{% endblock %}
