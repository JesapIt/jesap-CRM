{% extends "dashboard/base_figma.html" %}
{% load static %}

{% block title %}JESAP CRM - Home{% endblock %}

{% block head %}
<style>
    /* Stili aggiuntivi per le statistiche integrati nel design Figma */
    .dashboard-content { max-width: 1200px; margin: 40px auto; padding: 0 22px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background-color: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 2px solid var(--soft-line); display: flex; align-items: center; gap: 15px; }
    .stat-icon-container { width: 50px; height: 50px; background-color: rgba(138, 59, 134, .08); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--brand); }
    .stat-data { display: flex; flex-direction: column; }
    .stat-label { font-size: 14px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--ink); }

    /* MAGIA: Il background Viola della Sapienza! */
    .hero--home {
        background-image: linear-gradient(rgba(138, 59, 134, 0.75), rgba(46, 17, 85, 0.85)), url('{% static "dashboard/images/jesap_crm_bg.jpg" %}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
</style>
{% endblock %}

{% block content %}
  <section class="hero hero--home">
    <div class="hero__inner">
      <div class="hero__avatar" aria-hidden="true" style="background-image: url('https://ui-avatars.com/api/?name=Admin&background=fff&color=8A3B86'); background-size: cover;"></div>
      <h1 class="hero__title">Benvenuto nel CRM!</h1>
    </div>
  </section>

  <div class="dashboard-content">
      <section class="stats-grid">
          <div class="stat-card">
              <div class="stat-icon-container">👥</div>
              <div class="stat-data">
                  <span class="stat-label">Contatti</span>
                  <span class="stat-value">1.250</span>
              </div>
          </div>
          <div class="stat-card">
              <div class="stat-icon-container">🤝</div>
              <div class="stat-data">
                  <span class="stat-label">Trattative Aperte</span>
                  <span class="stat-value">45</span>
              </div>
          </div>
          <div class="stat-card">
              <div class="stat-icon-container">💰</div>
              <div class="stat-data">
                  <span class="stat-label">Ricavi Mese</span>
                  <span class="stat-value">€12.500</span>
              </div>
          </div>
          <div class="stat-card">
              <div class="stat-icon-container">📈</div>
              <div class="stat-data">
                  <span class="stat-label">Performance</span>
                  <span class="stat-value">92%</span>
              </div>
          </div>
      </section>
  </div>
{% endblock %}
