{% extends "dashboard/base_figma.html" %}

{% block title %}Password aggiornata | JESAP CRM{% endblock %}

{% block head %}
<style>
    .auth-container { max-width: 400px; margin: 80px auto; padding: 40px 30px; background: #fff; border-radius: 12px; box-shadow: var(--shadow); border: 2px solid var(--soft-line); }
    .auth-title { text-align: center; color: var(--brand); margin-top: 0; margin-bottom: 24px; font-size: 28px; font-weight: 700; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
    .auth-link a { color: var(--brand); text-decoration: none; font-weight: 600; }
    .auth-link a:hover { text-decoration: underline; }
    .auth-help { font-size: 14px; color: var(--ink); line-height: 1.6; margin: 0; text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Password aggiornata</h2>
    <p class="auth-help">La password è stata reimpostata con successo. Ora puoi accedere con le nuove credenziali.</p>
    <p class="auth-link"><a href="{% url 'login' %}">Vai al login</a></p>
</div>
{% endblock %}
